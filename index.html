<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Marmina League</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --card-bg: rgba(20, 30, 48, 0.7); --primary-accent: #00e5ff; }
        body { background: #0f172a; color: white; font-family: 'Tajawal', sans-serif; padding: 20px; }
        .app-container { max-width: 480px; margin: 0 auto; }
        .glass-card { background: var(--card-bg); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        h1 { text-align: center; color: var(--primary-accent); margin-bottom: 20px; }
        .league-table { width: 100%; border-collapse: collapse; margin-top: 10px; color: white; }
        .league-table th, .league-table td { padding: 10px; border-bottom: 1px solid #334155; text-align: center; }
    </style>
</head>
<body>
    <div class="app-container">
        <h1>⚡ Marmina League</h1>
        <div id="content" class="glass-card">جاري تحميل البيانات...</div>
    </div>
    <script>
        fetch('database.json?v=' + new Date().getTime())
            .then(r => r.json())
            .then(data => {
                let table = `<table class="league-table"><tr><th>الفريق</th><th>لعب</th><th>نقاط</th></tr>`;
                // هنا يتم عرض الترتيب بناءً على داتا الماتشات
                document.getElementById('content').innerHTML = table + `</table>`;
            });
    </script>
</body>
</html>
