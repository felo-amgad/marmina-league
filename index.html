<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marmina League</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --card-bg: rgba(20, 30, 48, 0.7); --card-border: rgba(255, 255, 255, 0.15);
            --primary-accent: #00e5ff; --secondary-accent: #ff007f;
            --text-main: #ffffff; --text-muted: #b0bec5;
            --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
        body { background: linear-gradient(rgba(10, 20, 30, 0.8), rgba(15, 32, 39, 0.9)), url('https://images.unsplash.com/photo-1522778119026-d647f0596c20?q=80&w=1080&auto=format&fit=crop') center/cover fixed; color: var(--text-main); min-height: 100vh; -webkit-tap-highlight-color: transparent; }
        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; backdrop-filter: blur(5px); padding-bottom: 30px; }
        @keyframes slideInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animated { animation: slideInUp 0.4s ease-out forwards; }
        header { padding: 25px 20px 15px; text-align: center; font-size: 28px; font-weight: 900; position: sticky; top: 0; z-index: 100; background: rgba(10, 20, 30, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--card-border); color: transparent; background-image: linear-gradient(45deg, var(--primary-accent), var(--secondary-accent)); background-clip: text; -webkit-background-clip: text; }
        .nav-tabs { display: flex; background: rgba(0, 0, 0, 0.5); margin: 15px; border-radius: 12px; overflow: hidden; border: 1px solid var(--card-border); }
        .nav-tab { flex: 1; padding: 10px 5px; text-align: center; font-weight: bold; font-size: 14px; color: var(--text-muted); cursor: pointer; transition: 0.3s; }
        .nav-tab.active { color: #fff; background: rgba(255, 255, 255, 0.1); border-bottom: 3px solid var(--primary-accent); }
        .content { padding: 0 15px; }
        .glass-card { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid var(--card-border); border-radius: 15px; padding: 15px; margin-bottom: 20px; box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5); transition: 0.3s; }
        .round-item { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .round-name { font-size: 18px; font-weight: 900; color: var(--primary-accent); }
        .round-date { color: var(--text-muted); font-size: 13px; margin-top: 5px;}
        .back-btn { background: rgba(0, 229, 255, 0.1); border: 1px solid var(--primary-accent); color: var(--primary-accent); padding: 10px; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 15px; }
        .score-board { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; }
        .team-container { display: flex; flex-direction: column; align-items: center; width: 35%; }
        .team-logo { width: 45px; height: 45px; object-fit: contain; margin-bottom: 8px; filter: drop-shadow(0px 2px 5px #000); }
        .team { font-size: 13px; font-weight: 900; text-align: center; }
        .score { font-size: 24px; font-weight: 900; background: linear-gradient(45deg, var(--secondary-accent), var(--primary-accent)); color: #000; padding: 5px 15px; border-radius: 8px; }
        .match-events-grid { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px dashed rgba(255,255,255,0.2); padding-top: 15px; margin-top: 5px; gap: 10px; }
        .event-cell { text-align: center; padding: 0; }
        .team-a-cell { border-left: 1px solid rgba(255,255,255,0.1); padding-left: 10px; }
        .team-b-cell { padding-right: 10px; }
        .event-type { font-size: 14px; margin-bottom: 10px; color: var(--primary-accent); font-weight: bold;}
        .event-list { list-style: none; padding: 0; margin: 0 0 10px 0; }
        .event-item { display: flex; align-items: center; justify-content: flex-start; gap: 10px; margin-bottom: 8px; background: rgba(255,255,255,0.05); padding: 6px 10px; border-radius: 20px; }
        .player-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary-accent); background-color: #fff; flex-shrink: 0; }
        .event-item span { color: #fff; font-weight: 700; font-size: 13px; text-align: right; line-height: 1.4; }
        .own-goal { color: var(--secondary-accent) !important; font-size: 10px !important; }
        .league-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        .league-table th { color: var(--primary-accent); padding: 8px 2px; border-bottom: 1px solid rgba(255,255,255,0.2); font-size: 11px; }
        .league-table td { padding: 10px 2px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; font-weight: bold; }
        .league-table td.team-name { text-align: right; color: #fff; display: flex; align-items: center; gap: 5px; font-size: 12px;}
        .league-table td.team-name img { width: 18px; height: 18px; }
        .league-table td.pts { color: var(--secondary-accent); font-size: 15px; }
        .gd-positive { color: #00ff88; } .gd-negative { color: #ff4b2b; }
        .stats-title { color: var(--primary-accent); font-size: 16px; font-weight: 900; margin-bottom: 15px; text-align: center; }
        .tier-card { background: rgba(0, 0, 0, 0.3); border-radius: 12px; margin-bottom: 15px; padding: 12px; position: relative; }
        .tier-1 { border: 2px solid var(--gold); } .tier-2 { border: 2px solid var(--silver); } .tier-3 { border: 2px solid var(--bronze); }
        .tier-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 8px; margin-bottom: 12px; }
        .tier-title { font-size: 15px; font-weight: 900; }
        .tier-1 .tier-title { color: var(--gold); } .tier-2 .tier-title { color: var(--silver); } .tier-3 .tier-title { color: var(--bronze); }
        .tier-badge { padding: 3px 10px; border-radius: 15px; font-weight: 900; color: #000; font-size: 12px; }
        .tier-1 .tier-badge { background: var(--gold); } .tier-2 .tier-badge { background: var(--silver); } .tier-3 .tier-badge { background: var(--bronze); }
        .tied-players-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
        .player-podium-item { display: flex; flex-direction: column; align-items: center; width: 75px; }
        .podium-avatar { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; margin-bottom: 6px; background: #fff; }
        .tier-1 .podium-avatar { width: 70px; height: 70px; border: 3px solid var(--gold); } .tier-2 .podium-avatar { border: 2px solid var(--silver); } .tier-3 .podium-avatar { border: 2px solid var(--bronze); }
        .podium-name { font-weight: 900; font-size: 12px; color: #fff; text-align: center; margin-bottom: 2px; }
        .tier-1 .podium-name { font-size: 14px; color: var(--gold); }
        .podium-team { font-size: 10px; color: var(--text-muted); text-align: center; }
        .hidden { display: none !important; }
        .loader { text-align: center; padding: 50px; color: var(--primary-accent); font-weight: bold; }
    </style>
</head>
<body>
    <div class="app-container">
        <header>⚡ Marmina League</header>
        <div class="nav-tabs">
            <div class="nav-tab active" id="tab-rounds" onclick="switchTab('rounds')">المباريات</div>
            <div class="nav-tab" id="tab-stats" onclick="switchTab('stats')">الترتيب والإحصائيات</div>
        </div>
        <div class="content">
            <div id="loader" class="loader">جاري تحميل البيانات... ⏳</div>
            <div id="rounds-view" class="hidden"></div>
            <div id="match-details-view" class="hidden">
                <button class="back-btn" onclick="showRounds()">⬅ رجوع للجولات</button>
                <h3 id="current-round-title" style="margin-bottom: 20px; text-align: center; color: var(--text-main); font-weight: 900;"></h3>
                <div id="matches-container"></div>
            </div>
            <div id="stats-view" class="hidden">
                <div class="glass-card animated" style="animation-delay: 0.1s; padding: 15px 5px;">
                    <div class="stats-title">📊 جدول الترتيب</div>
                    <table class="league-table">
                        <thead>
                            <tr>
                                <th style="text-align: right;">الفريق</th>
                                <th>لعب</th><th>ف</th><th>ت</th><th>خ</th>
                                <th title="له">له</th><th title="عليه">ع</th><th title="الفرق">+/-</th>
                                <th>نقاط</th>
                            </tr>
                        </thead>
                        <tbody id="league-standings-body"></tbody>
                    </table>
                </div>
                <div class="glass-card animated" style="animation-delay: 0.2s;">
                    <div class="stats-title">⚽ أعلى الهدافين</div>
                    <div id="top-scorers-container"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        let logos = {}; let playerImages = {}; let leagueData = []; let statsData = {};
        const defaultAvatar = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";

        async function fetchDatabase() {
            try {
                const response = await fetch('database.json?v=' + new Date().getTime());
                const data = await response.json();
                logos = data.logos; playerImages = data.playerImages; 
                leagueData = data.leagueData; statsData = data.statsData;
                document.getElementById('loader').style.display = 'none';
                document.getElementById('rounds-view').classList.remove('hidden');
                renderRounds();
            } catch (error) {
                console.error("Error Loading DB:", error);
                document.getElementById('loader').innerHTML = '❌ حدث خطأ في تحميل قاعدة البيانات.';
            }
        }

        function getPlayerAvatarSrc(text) {
            if (!text) return defaultAvatar;
            let cleanText = text.replace(/<[^>]*>/g, '').trim();
            for (let name in playerImages) {
                if (cleanText.includes(name) || name.includes(cleanText)) return playerImages[name];
            }
            let firstWord = cleanText.split(' ')[0];
            if (firstWord && firstWord.length > 2) {
                for (let name in playerImages) {
                    if (name.includes(firstWord)) return playerImages[name];
                }
            }
            return defaultAvatar;
        }

        function calculateStandings() {
            const standings = {};
            Object.keys(logos).forEach(team => {
                standings[team] = { name: team, logo: logos[team], played: 0, won: 0, drawn: 0, lost: 0, points: 0, goalsFor: 0, goalsAgainst: 0, goalDiff: 0 };
            });
            leagueData.forEach(round => {
                round.matches.forEach(match => {
                    standings[match.teamA].played++; standings[match.teamB].played++;
                    standings[match.teamA].goalsFor += match.scoreA; standings[match.teamA].goalsAgainst += match.scoreB;
                    standings[match.teamB].goalsFor += match.scoreB; standings[match.teamB].goalsAgainst += match.scoreA;
                    if (match.scoreA > match.scoreB) { standings[match.teamA].won++; standings[match.teamA].points += 3; standings[match.teamB].lost++; } 
                    else if (match.scoreB > match.scoreA) { standings[match.teamB].won++; standings[match.teamB].points += 3; standings[match.teamA].lost++; } 
                    else { standings[match.teamA].drawn++; standings[match.teamA].points += 1; standings[match.teamB].drawn++; standings[match.teamB].points += 1; }
                });
            });
            Object.values(standings).forEach(team => team.goalDiff = team.goalsFor - team.goalsAgainst);
            return Object.values(standings).sort((a, b) => {
                if (b.points !== a.points) return b.points - a.points;
                if (b.goalDiff !== a.goalDiff) return b.goalDiff - a.goalDiff;
                return b.goalsFor - a.goalsFor;
            });
        }

        function switchTab(tabName) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
            document.getElementById('rounds-view').classList.add('hidden');
            document.getElementById('match-details-view').classList.add('hidden');
            document.getElementById('stats-view').classList.add('hidden');
            if (tabName === 'rounds') { document.getElementById('rounds-view').classList.remove('hidden'); renderRounds(); } 
            else if (tabName === 'stats') { document.getElementById('stats-view').classList.remove('hidden'); renderStats(); }
        }

        function renderRounds() {
            const roundsView = document.getElementById('rounds-view'); roundsView.innerHTML = '';
            leagueData.forEach((round, index) => {
                const roundDiv = document.createElement('div');
                roundDiv.className = 'glass-card round-item animated';
                roundDiv.style.animationDelay = `${index * 0.1}s`;
                roundDiv.onclick = () => showMatchDetails(round.id);
                roundDiv.innerHTML = `<div><div class="round-name">${round.name}</div><div class="round-date">${round.date}</div></div><div style="font-size: 26px;">🔥</div>`;
                roundsView.appendChild(roundDiv);
            });
        }

        function showMatchDetails(roundId) {
            const round = leagueData.find(r => r.id === roundId); if (!round) return;
            document.getElementById('current-round-title').innerText = round.name;
            const matchesContainer = document.getElementById('matches-container'); matchesContainer.innerHTML = '';
            round.matches.forEach((match, index) => {
                const generateList = (items) => items.length > 0 ? items.map(i => `<li class="event-item"><img src="${getPlayerAvatarSrc(i)}" class="player-avatar" alt=""> <span>${i}</span></li>`).join('') : '<li style="text-align:center; padding:5px; color:#aaa;">-</li>';
                matchesContainer.innerHTML += `
                    <div class="glass-card animated" style="animation-delay: ${index * 0.1}s">
                        <div class="score-board">
                            <div class="team-container"><img src="${logos[match.teamA]}" class="team-logo" alt="${match.teamA}"><div class="team">${match.teamA}</div></div>
                            <div class="score">${match.scoreA} - ${match.scoreB}</div>
                            <div class="team-container"><img src="${logos[match.teamB]}" class="team-logo" alt="${match.teamB}"><div class="team">${match.teamB}</div></div>
                        </div>
                        <div class="match-events-grid">
                            <div class="event-cell team-a-cell"><div class="event-type">⚽ الأهداف</div><ul class="event-list">${generateList(match.eventsA.goals)}</ul></div>
                            <div class="event-cell team-b-cell"><div class="event-type">⚽ الأهداف</div><ul class="event-list">${generateList(match.eventsB.goals)}</ul></div>
                            <div class="event-cell team-a-cell"><div class="event-type">🟨 إنذارات</div><ul class="event-list">${generateList(match.eventsA.yellowCards)}</ul></div>
                            <div class="event-cell team-b-cell"><div class="event-type">🟨 إنذارات</div><ul class="event-list">${generateList(match.eventsB.yellowCards)}</ul></div>
                            <div class="event-cell team-a-cell"><div class="event-type">🟥 طرد</div><ul class="event-list">${generateList(match.eventsA.redCards)}</ul></div>
                            <div class="event-cell team-b-cell"><div class="event-type">🟥 طرد</div><ul class="event-list">${generateList(match.eventsB.redCards)}</ul></div>
                        </div>
                    </div>`;
            });
            document.getElementById('rounds-view').classList.add('hidden');
            document.getElementById('match-details-view').classList.remove('hidden');
        }

        function renderStats() {
            const standings = calculateStandings();
            const standingsBody = document.getElementById('league-standings-body'); standingsBody.innerHTML = '';
            standings.forEach(team => {
                let gdClass = team.goalDiff > 0 ? 'gd-positive' : (team.goalDiff < 0 ? 'gd-negative' : '');
                let gdText = team.goalDiff > 0 ? `+${team.goalDiff}` : team.goalDiff;
                standingsBody.innerHTML += `<tr><td class="team-name"><img src="${team.logo}" alt="${team.name}">${team.name}</td><td>${team.played}</td><td>${team.won}</td><td>${team.drawn}</td><td>${team.lost}</td><td>${team.goalsFor}</td><td>${team.goalsAgainst}</td><td class="${gdClass}" dir="ltr">${gdText}</td><td class="pts">${team.points}</td></tr>`;
            });
            const scorersContainer = document.getElementById('top-scorers-container');
            let uniqueGoalCounts = [...new Set(statsData.topScorers.map(p => p.count))].sort((a, b) => b - a);
            let top3GoalCounts = uniqueGoalCounts.slice(0, 3); let scorersHtml = '';
            const rankClasses = ['tier-1', 'tier-2', 'tier-3']; const rankTitles = ['🥇 المركز الأول', '🥈 المركز الثاني', '🥉 المركز الثالث'];
            top3GoalCounts.forEach((goalCount, index) => {
                let tiedPlayers = statsData.topScorers.filter(p => p.count === goalCount);
                let playersHtml = tiedPlayers.map(player => `<div class="player-podium-item"><img src="${getPlayerAvatarSrc(player.name)}" class="podium-avatar" alt="${player.name}"><div class="podium-name">${player.name}</div><div class="podium-team">${player.team}</div></div>`).join('');
                scorersHtml += `<div class="tier-card ${rankClasses[index]}"><div class="tier-header"><div class="tier-title">${rankTitles[index]}</div><div class="tier-badge">${goalCount} ⚽</div></div><div class="tied-players-container">${playersHtml}</div></div>`;
            });
            scorersContainer.innerHTML = scorersHtml;
        }

        function showRounds() { document.getElementById('match-details-view').classList.add('hidden'); document.getElementById('rounds-view').classList.remove('hidden'); }
        fetchDatabase();
    </script>
</body>
</html>
