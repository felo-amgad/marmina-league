<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الشاملة - الأدمن</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a; --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #00e5ff; --secondary: #ff007f;
            --text: #ffffff; --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
        body { background: var(--bg-color); color: var(--text); padding: 20px; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 25px; }
        header h1 { color: var(--primary); font-size: 26px; font-weight: 900; }
        
        .glass-card { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .title { color: var(--primary); font-size: 18px; font-weight: 900; margin-bottom: 15px; border-bottom: 1px dashed var(--border); padding-bottom: 8px; }
        
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: white; margin-bottom: 15px; font-size: 14px; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .btn-primary { background: var(--primary); color: black; }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-success { background: #00ff88; color: black; font-size: 16px; padding: 15px;}
        
        .admin-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; background: rgba(255,255,255,0.05); color: #aaa; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-weight: bold; text-align: center;}
        .tab-btn.active { background: var(--primary); color: black; border-color: var(--primary); }
        
        .attendance-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .checkbox-group { display: flex; gap: 15px; }
        .checkbox-group label { display: flex; align-items: center; gap: 4px; font-size: 12px; cursor: pointer; }
        .checkbox-group input { width: auto; margin: 0; }
        
        .save-bar { position: sticky; bottom: 10px; z-index: 1000; }
        .hidden { display: none !important; }
        .match-box { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border); }
        .event-badge { background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 12px; font-size: 11px; margin-left: 5px; display: inline-block; margin-top: 5px;}
    </style>
</head>
<body>

    <div class="container">
        <header><h1>🔒 الإدارة الذكية</h1></header>

        <div id="login-section" class="glass-card">
            <div class="title">تسجيل دخول الإدارة</div>
            <input type="password" id="admin-pass" placeholder="أدخل كلمة المرور">
            <button class="btn-primary" onclick="handleLogin()">دخول</button>
        </div>

        <div id="main-panel" class="hidden">
            <div class="admin-tabs">
                <div class="tab-btn active" id="btn-tab-config" onclick="switchTab('config')">إعدادات الربط</div>
                <div class="tab-btn" id="btn-tab-attendance" onclick="switchTab('attendance')">الحضور</div>
                <div class="tab-btn" id="btn-tab-matches" onclick="switchTab('matches')">المباريات</div>
            </div>

            <div class="save-bar">
                <button class="btn-success" onclick="pushChangesToGitHub()">💾 حفظ وحساب الإحصائيات أوتوماتيكياً</button>
            </div>

            <div id="section-config" class="glass-card animated">
                <div class="title">⚙️ إعدادات ربط GitHub</div>
                <label>Token (الرمز السري اللي جبناه):</label>
                <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxxxxxx">
                <label>اسم حسابك (Username):</label>
                <input type="text" id="gh-owner" placeholder="مثال: FelopaterAmgad">
                <label>اسم المستودع (Repository):</label>
                <input type="text" id="gh-repo" placeholder="مثال: marmina-league">
                <button class="btn-primary" onclick="saveConfig()">حفظ محلياً</button>
            </div>

            <div id="section-attendance" class="glass-card hidden animated">
                <div class="title">🗓️ كشوفات الحضور</div>
                <label>اختر الشهر:</label><select id="attend-month-select" onchange="loadAttendanceForm()"></select>
                <label>اختر الجمعة:</label><select id="attend-friday-select" onchange="loadAttendanceForm()"></select>
                <div style="margin-bottom: 15px; display: flex; gap: 10px;">
                    <label style="font-size:13px;"><input type="checkbox" id="friday-visible-check" onchange="updateFridayMeta()"> إظهار للشباب</label>
                    <label style="font-size:13px;"><input type="checkbox" id="friday-active-check" onchange="updateFridayMeta()"> تفعيل الكشف</label>
                </div>
                <div id="attendance-players-list"></div>
            </div>

            <div id="section-matches" class="glass-card hidden animated">
                <div class="title">⚽ المباريات (تسجيل الأهداف يحسب تلقائياً)</div>
                <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-bottom: 15px;">
                    <div style="font-size: 13px; color: var(--secondary); margin-bottom: 8px;">➕ إضافة جولة</div>
                    <input type="text" id="new-round-name" placeholder="اسم الجولة">
                    <input type="text" id="new-round-date" placeholder="تاريخها">
                    <button class="btn-secondary" onclick="addNewRound()">إنشاء الجولة</button>
                </div>
                <label>الجولة المحددة للتعديل:</label><select id="round-matches-select" onchange="loadRoundMatches()"></select>
                <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-bottom: 15px;">
                    <div style="font-size: 13px; color: var(--primary); margin-bottom: 8px;">🎮 إضافة ماتش</div>
                    <select id="match-team-a"></select><select id="match-team-b"></select>
                    <div style="display: flex; gap: 10px;">
                        <input type="number" id="match-score-a" placeholder="أهداف A"><input type="number" id="match-score-b" placeholder="أهداف B">
                    </div>
                    <button class="btn-primary" onclick="addNewMatch()">إدراج المباراة</button>
                </div>
                <div id="current-round-matches-list"></div>
            </div>
        </div>
    </div>

    <script>
        let db = {}; 
        function handleLogin() {
            if(document.getElementById('admin-pass').value === "1234") {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('main-panel').classList.remove('hidden');
                loadConfigFromStorage(); fetchDatabaseFromServer();
            } else { alert("الباسورد غلط!"); }
        }

        function loadConfigFromStorage() {
            if(localStorage.getItem('gh_token')) document.getElementById('gh-token').value = localStorage.getItem('gh_token');
            if(localStorage.getItem('gh_owner')) document.getElementById('gh-owner').value = localStorage.getItem('gh_owner');
            if(localStorage.getItem('gh_repo')) document.getElementById('gh-repo').value = localStorage.getItem('gh_repo');
        }

        function saveConfig() {
            localStorage.setItem('gh_token', document.getElementById('gh-token').value.trim());
            localStorage.setItem('gh_owner', document.getElementById('gh-owner').value.trim());
            localStorage.setItem('gh_repo', document.getElementById('gh-repo').value.trim());
            alert("تم حفظ إعدادات GitHub!");
        }

        async function fetchDatabaseFromServer() {
            const res = await fetch('database.json?v=' + new Date().getTime());
            db = await res.json();
            populateSelects(); loadAttendanceForm(); loadRoundMatches();
        }

        function populateSelects() {
            const monthSel = document.getElementById('attend-month-select');
            monthSel.innerHTML = db.attendanceData.map((m, i) => `<option value="${i}">شهر ${m.month}</option>`).join('');
            updateFridaysList();
            document.getElementById('round-matches-select').innerHTML = db.leagueData.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
            let teamOptions = Object.keys(db.logos).map(t => `<option value="${t}">${t}</option>`).join('');
            document.getElementById('match-team-a').innerHTML = teamOptions; document.getElementById('match-team-b').innerHTML = teamOptions;
        }

        function updateFridaysList() {
            const mIdx = document.getElementById('attend-month-select').value;
            if(db.attendanceData[mIdx]) {
                document.getElementById('attend-friday-select').innerHTML = db.attendanceData[mIdx].fridays.map((f, i) => `<option value="${i}">${f.name}</option>`).join('');
            }
        }

        function loadAttendanceForm() {
            const mIdx = document.getElementById('attend-month-select').value; const fIdx = document.getElementById('attend-friday-select').value;
            if(!db.attendanceData[mIdx] || !db.attendanceData[mIdx].fridays[fIdx]) return;
            const fri = db.attendanceData[mIdx].fridays[fIdx];
            document.getElementById('friday-visible-check').checked = fri.visible; document.getElementById('friday-active-check').checked = fri.hasAttendance;
            if(!fri.records) fri.records = {};
            const list = document.getElementById('attendance-players-list'); list.innerHTML = '';
            db.players.sort().forEach(p => {
                if(!fri.records[p]) fri.records[p] = { friday: false, study: false, activity: false };
                let r = fri.records[p];
                list.innerHTML += `<div class="attendance-row"><div>${p}</div><div class="checkbox-group">
                    <label><input type="checkbox" ${r.friday ? 'checked' : ''} onchange="toggleAttend('${p}', 'friday', this.checked)"> عام</label>
                    <label><input type="checkbox" ${r.study ? 'checked' : ''} onchange="toggleAttend('${p}', 'study', this.checked)"> دراسي</label>
                    <label><input type="checkbox" ${r.activity ? 'checked' : ''} onchange="toggleAttend('${p}', 'activity', this.checked)"> نشاط</label>
                </div></div>`;
            });
        }

        function toggleAttend(p, t, v) { db.attendanceData[document.getElementById('attend-month-select').value].fridays[document.getElementById('attend-friday-select').value].records[p][t] = v; }
        function updateFridayMeta() {
            const f = db.attendanceData[document.getElementById('attend-month-select').value].fridays[document.getElementById('attend-friday-select').value];
            f.visible = document.getElementById('friday-visible-check').checked; f.hasAttendance = document.getElementById('friday-active-check').checked;
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.glass-card').forEach(c => { if(c.id !== 'login-section') c.classList.add('hidden'); });
            document.getElementById(`btn-tab-${tab}`).classList.add('active'); document.getElementById(`section-${tab}`).classList.remove('hidden');
        }

        function addNewRound() {
            const name = document.getElementById('new-round-name').value.trim(); const date = document.getElementById('new-round-date').value.trim();
            if(!name) return;
            const newId = db.leagueData.length + 1;
            db.leagueData.push({ id: newId, name: name, date: date, matches: [] });
            populateSelects(); document.getElementById('round-matches-select').value = newId; loadRoundMatches();
        }

        function addNewMatch() {
            const round = db.leagueData.find(r => r.id == document.getElementById('round-matches-select').value);
            const tA = document.getElementById('match-team-a').value; const tB = document.getElementById('match-team-b').value;
            if(tA === tB) return alert("لا يمكن اختيار نفس الفريق!");
            round.matches.push({ teamA: tA, teamB: tB, scoreA: parseInt(document.getElementById('match-score-a').value)||0, scoreB: parseInt(document.getElementById('match-score-b').value)||0, eventsA: { goals: [], yellowCards: [], redCards: [] }, eventsB: { goals: [], yellowCards: [], redCards: [] } });
            loadRoundMatches();
        }

        function loadRoundMatches() {
            const round = db.leagueData.find(r => r.id == document.getElementById('round-matches-select').value);
            const container = document.getElementById('current-round-matches-list'); container.innerHTML = '';
            if(!round || round.matches.length === 0) return;

            round.matches.forEach((m, mIdx) => {
                container.innerHTML += `
                    <div class="match-box">
                        <div style="font-weight:bold; margin-bottom:10px;">${m.teamA} (${m.scoreA}) ضد ${m.teamB} (${m.scoreB})</div>
                        <div style="display:flex; gap:5px; margin-bottom: 10px;">
                            <input style="padding:4px; font-size:12px; margin:0; flex:2;" type="text" id="event-text-${mIdx}" placeholder="مثال: يوسف (أسيست مينا)">
                            <select style="padding:4px; font-size:12px; margin:0; flex:1;" id="event-team-${mIdx}"><option value="A">${m.teamA}</option><option value="B">${m.teamB}</option></select>
                            <button class="btn-primary" style="padding:4px; font-size:12px; margin:0;" onclick="addGoal(${mIdx})">⚽ إضافة جول</button>
                        </div>
                        <div style="font-size:11px; color:#aaa;">الأهداف: 
                            ${m.eventsA.goals.map(e => `<span class="event-badge">${m.teamA}: ${e}</span>`).join('')}
                            ${m.eventsB.goals.map(e => `<span class="event-badge">${m.teamB}: ${e}</span>`).join('')}
                        </div>
                    </div>
                `;
            });
        }

        function addGoal(mIdx) {
            const rId = document.getElementById('round-matches-select').value;
            const match = db.leagueData.find(r => r.id == rId).matches[mIdx];
            const team = document.getElementById(`event-team-${mIdx}`).value;
            const text = document.getElementById(`event-text-${mIdx}`).value.trim();
            if(!text) return;
            match[`events${team}`].goals.push(text);
            loadRoundMatches();
        }

        // السحر هنا: الدالة دي بتشتغل قبل الحفظ عشان تحلل الماتشات وتطلع ההداف والأسيست أوتوماتيك
        function autoCalculateStats() {
            let scorers = {}; let assists = {};
            
            db.leagueData.forEach(round => {
                round.matches.forEach(match => {
                    const processGoals = (goalsList, teamName) => {
                        goalsList.forEach(goalStr => {
                            if(goalStr.includes('own-goal') || goalStr.includes('هدف ذاتي')) return; // تجاهل الأهداف الذاتية
                            
                            // استخراج اسم الهداف (بياخد أول اسم قبل القوس)
                            let scorerMatch = goalStr.split('(')[0].split('<')[0].trim();
                            if(scorerMatch) {
                                if(!scorers[scorerMatch]) scorers[scorerMatch] = {name: scorerMatch, team: teamName, count: 0};
                                scorers[scorerMatch].count++;
                            }
                            // استخراج صانع اللعب (أي حاجة جوه قوسين كلمة أسيست)
                            let assistMatch = goalStr.match(/\(أسيست\s+([^)]+)\)/);
                            if(assistMatch && assistMatch[1]) {
                                let assistName = assistMatch[1].trim();
                                if(!assists[assistName]) assists[assistName] = {name: assistName, team: teamName, count: 0};
                                assists[assistName].count++;
                            }
                        });
                    };
                    processGoals(match.eventsA.goals, match.teamA);
                    processGoals(match.eventsB.goals, match.teamB);
                });
            });
            // تحديث الإحصائيات في الداتا قبل الرفع
            db.statsData.topScorers = Object.values(scorers).sort((a,b) => b.count - a.count);
            db.statsData.topAssists = Object.values(assists).sort((a,b) => b.count - a.count);
        }

        async function pushChangesToGitHub() {
            const token = localStorage.getItem('gh_token'); const owner = localStorage.getItem('gh_owner'); const repo = localStorage.getItem('gh_repo');
            if(!token || !owner || !repo) return alert("⚠️ املأ إعدادات GitHub أولاً!");

            // استدعاء السحر: تجميع الجوان والأسيستات وحفظها في الداتا
            autoCalculateStats();

            const url = `https://api.github.com/repos/${owner}/${repo}/contents/database.json`;
            try {
                const getRes = await fetch(url, { headers: { "Authorization": `token ${token}` } });
                const currentSha = (await getRes.json()).sha;
                
                // تحويل الداتا المعربة إلى Base64 بأمان
                const jsonString = JSON.stringify(db, null, 2);
                const utf8Bytes = new TextEncoder().encode(jsonString);
                const base64Content = btoa(String.fromCharCode.apply(null, utf8Bytes));

                const putRes = await fetch(url, {
                    method: "PUT",
                    headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ message: "تحديث مباريات وإحصائيات وحضور أوتوماتيكي ⚡", content: base64Content, sha: currentSha })
                });

                if(putRes.ok) alert("🎉 تم الحفظ بنجاح! روح بص على الموقع للشباب هتلاقي الماتشات والترتيب والهدافين كلهم اتحدثوا لوحدهم!");
                else alert("❌ فشل الحفظ. راجع الـ Token.");
            } catch (error) { alert("❌ خطأ: " + error.message); }
        }
    </script>
</body>
</html>
