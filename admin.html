<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الشاملة - الأدمن</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a; --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #00e5ff; --secondary: #ff007f;
            --text: #ffffff; --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
        body { background: var(--bg-color); color: var(--text); padding: 20px; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 25px; }
        header h1 { color: var(--primary); font-size: 26px; font-weight: 900; }
        
        .glass-card { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .title { color: var(--primary); font-size: 18px; font-weight: 900; margin-bottom: 15px; border-bottom: 1px dashed var(--border); padding-bottom: 8px; }
        
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: white; margin-bottom: 15px; font-size: 14px; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .btn-primary { background: var(--primary); color: black; }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-success { background: #00ff88; color: black; font-size: 16px; padding: 15px; box-shadow: 0 0 15px rgba(0,255,136,0.4);}
        .btn-danger { background: #ff4b2b; color: white; padding: 6px 12px; font-size: 12px; margin:0; border-radius: 6px; width: auto;}
        .btn-delete-match { background: transparent; color: #ff4b2b; border: 1px solid #ff4b2b; margin-top: 15px; }
        .btn-delete-match:hover { background: #ff4b2b; color: white; }
        
        .admin-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; background: rgba(255,255,255,0.05); color: #aaa; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-weight: bold; text-align: center;}
        .tab-btn.active { background: var(--primary); color: black; border-color: var(--primary); }
        
        .save-bar { position: sticky; bottom: 10px; z-index: 1000; }
        .hidden { display: none !important; }
        
        .checkbox-group { display: flex; gap: 15px; margin-top: 10px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; justify-content: space-around;}
        .checkbox-group label { display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: pointer; font-weight: bold;}
        .checkbox-group input { width: 20px; height: 20px; margin: 0; cursor: pointer;}
        
        .edit-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px dashed var(--primary); }
        .event-badge { background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 12px; font-size: 13px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border);}
        .score-display { text-align: center; font-size: 24px; font-weight: 900; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px; margin-bottom: 15px; letter-spacing: 2px;}
    </style>
</head>
<body>

    <div class="container">
        <header><h1>🔒 الإدارة الذكية</h1></header>

        <div id="login-section" class="glass-card">
            <div class="title">تسجيل دخول الإدارة</div>
            <input type="password" id="admin-pass" placeholder="أدخل كلمة المرور">
            <button class="btn-primary" onclick="handleLogin()">دخول</button>
        </div>
        <div id="main-panel" class="hidden">
            <div class="admin-tabs">
                <div class="tab-btn active" id="btn-tab-config" onclick="switchTab('config')">الربط</div>
                <div class="tab-btn" id="btn-tab-attendance" onclick="switchTab('attendance')">الحضور</div>
                <div class="tab-btn" id="btn-tab-matches" onclick="switchTab('matches')">المباريات</div>
            </div>

            <div class="save-bar">
                <button class="btn-success" onclick="pushChangesToGitHub()">💾 حفظ وحساب الإحصائيات أوتوماتيكياً</button>
            </div>

            <!-- إعدادات GitHub -->
            <div id="section-config" class="glass-card animated">
                <div class="title">⚙️ إعدادات ربط GitHub</div>
                <label>Token السري:</label><input type="password" id="gh-token" placeholder="ghp_...">
                <label>اسم الحساب:</label><input type="text" id="gh-owner" placeholder="مثال: FelopaterAmgad">
                <label>اسم المستودع:</label><input type="text" id="gh-repo" placeholder="مثال: marmina-league">
                <button class="btn-primary" onclick="saveConfig()">حفظ محلياً</button>
            </div>

            <!-- الحضور -->
            <div id="section-attendance" class="glass-card hidden animated">
                <div class="title">🗓️ تسجيل الحضور الفردي</div>
                <label>اختر الشهر:</label><select id="attend-month-select" onchange="updateFridaysList()"></select>
                <label>اختر الجمعة:</label><select id="attend-friday-select" onchange="loadAttendanceForm()"></select>
                
                <div style="margin-bottom: 15px; display: flex; gap: 10px; border-bottom: 1px solid var(--border); padding-bottom: 15px;">
                    <label style="font-size:13px; font-weight:bold;"><input type="checkbox" id="friday-visible-check" onchange="updateFridayMeta()"> إظهار للشباب</label>
                    <label style="font-size:13px; font-weight:bold;"><input type="checkbox" id="friday-active-check" onchange="updateFridayMeta()"> تفعيل الكشف</label>
                </div>

                <div id="player-attendance-area" class="hidden">
                    <label style="color: var(--primary); font-weight:bold;">اختر الولد لتسجيل حضوره:</label>
                    <select id="attend-player-select" onchange="loadPlayerRecord()"></select>
                    
                    <div class="checkbox-group">
                        <label><input type="checkbox" id="chk-friday" onchange="savePlayerRecord()"> جمعة</label>
                        <label><input type="checkbox" id="chk-study" onchange="savePlayerRecord()"> دراسي</label>
                        <label><input type="checkbox" id="chk-activity" onchange="savePlayerRecord()"> نشاط</label>
                    </div>
                </div>
            </div>

            <!-- المباريات وإدارة الأحداث -->
            <div id="section-matches" class="glass-card hidden animated">
                <div class="title">⚽ إدارة المباريات والجولات</div>
                
                <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-bottom: 15px;">
                    <div style="font-size: 13px; color: var(--secondary); margin-bottom: 8px;">➕ إضافة جولة جديدة</div>
                    <input type="text" id="new-round-name" placeholder="اسم الجولة">
                    <input type="text" id="new-round-date" placeholder="التاريخ">
                    <button class="btn-secondary" onclick="addNewRound()">إنشاء الجولة</button>
                </div>

                <label>اختر الجولة:</label><select id="round-matches-select" onchange="loadRoundMatchesList()"></select>
                
                <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-bottom: 15px;">
                    <div style="font-size: 13px; color: var(--primary); margin-bottom: 8px;">🎮 إضافة ماتش جديد للجولة</div>
                    <select id="match-team-a"></select><select id="match-team-b"></select>
                    <button class="btn-primary" onclick="addNewMatch()">إدراج المباراة</button>
                </div>

                <label style="color: var(--gold); font-weight:bold;">اختر المباراة لتعديلها وإضافة الأحداث:</label>
                <select id="match-edit-select" onchange="loadMatchDetails()"></select>

                <!-- منطقة تعديل الماتش (الاسكور والأحداث) -->
                <div id="match-editor-area" class="edit-box hidden">
                    <div class="score-display" id="live-score-display">0 - 0</div>
                    
                    <div style="margin-bottom: 10px; border-bottom: 1px dashed var(--border); padding-bottom: 10px;">
                        <label>الحدث:</label>
                        <select id="event-type" onchange="toggleEventFields()">
                            <option value="goals">⚽ تسجيل هدف</option>
                            <option value="yellowCards">🟨 إنذار أصفر</option>
                            <option value="redCards">🟥 طرد</option>
                        </select>
                        
                        <label>لصالح فريق:</label>
                        <select id="event-team"></select>

                        <label>اللاعب الأساسي:</label>
                        <select id="event-player"></select>

                        <div id="assist-container">
                            <label>صانع اللعب (أسيست):</label>
                            <select id="event-assist"></select>
                            
                            <label style="display:flex; align-items:center; gap:5px; margin-top:10px; color:var(--secondary); font-size:13px; font-weight:bold;">
                                <input type="checkbox" id="event-owngoal"> هذا الهدف (هدف ذاتي بالخطأ)
                            </label>
                        </div>

                        <button class="btn-primary" style="margin-top: 15px;" onclick="addMatchEvent()">إضافة الحدث للمباراة</button>
                    </div>

                    <!-- قائمة الأحداث المحفوظة عشان نمسح منها -->
                    <div id="match-events-list"></div>

                    <!-- زرار حذف المباراة بالكامل -->
                    <button class="btn-delete-match" onclick="deleteMatch()">🗑️ حذف هذه المباراة بالكامل</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = {}; 

        function handleLogin() {
            if(document.getElementById('admin-pass').value === "1234") {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('main-panel').classList.remove('hidden');
                loadConfigFromStorage(); fetchDatabaseFromServer();
            } else { alert("الباسورد غلط!"); }
        }

        function loadConfigFromStorage() {
            if(localStorage.getItem('gh_token')) document.getElementById('gh-token').value = localStorage.getItem('gh_token');
            if(localStorage.getItem('gh_owner')) document.getElementById('gh-owner').value = localStorage.getItem('gh_owner');
            if(localStorage.getItem('gh_repo')) document.getElementById('gh-repo').value = localStorage.getItem('gh_repo');
        }

        function saveConfig() {
            localStorage.setItem('gh_token', document.getElementById('gh-token').value.trim());
            localStorage.setItem('gh_owner', document.getElementById('gh-owner').value.trim());
            localStorage.setItem('gh_repo', document.getElementById('gh-repo').value.trim());
            alert("تم حفظ إعدادات GitHub!");
        }

        async function fetchDatabaseFromServer() {
            const res = await fetch('database.json?v=' + new Date().getTime());
            db = await res.json();
            populateSelects();
        }

        function populateSelects() {
            const monthSel = document.getElementById('attend-month-select');
            monthSel.innerHTML = db.attendanceData.map((m, i) => `<option value="${i}">شهر ${m.month}</option>`).join('');
            
            const playerSel = document.getElementById('attend-player-select');
            playerSel.innerHTML = db.players.sort().map(p => `<option value="${p}">${p}</option>`).join('');
            
            updateFridaysList();

            document.getElementById('round-matches-select').innerHTML = db.leagueData.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
            
            let teamOptions = Object.keys(db.logos).map(t => `<option value="${t}">${t}</option>`).join('');
            document.getElementById('match-team-a').innerHTML = teamOptions; 
            document.getElementById('match-team-b').innerHTML = teamOptions;

            let playersOptions = db.players.sort().map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('event-player').innerHTML = playersOptions;
            document.getElementById('event-assist').innerHTML = `<option value="">-- بدون أسيست --</option>` + playersOptions;

            loadRoundMatchesList();
        }

        /* ====== نظام الحضور ====== */
        function updateFridaysList() {
            const mIdx = document.getElementById('attend-month-select').value;
            const fSelect = document.getElementById('attend-friday-select');
            if(db.attendanceData[mIdx] && db.attendanceData[mIdx].fridays.length > 0) {
                fSelect.innerHTML = db.attendanceData[mIdx].fridays.map((f, i) => `<option value="${i}">${f.name} (${f.date})</option>`).join('');
                document.getElementById('player-attendance-area').classList.remove('hidden');
                loadAttendanceForm();
            } else {
                fSelect.innerHTML = '';
                document.getElementById('player-attendance-area').classList.add('hidden');
            }
        }

        function loadAttendanceForm() {
            const mIdx = document.getElementById('attend-month-select').value; 
            const fIdx = document.getElementById('attend-friday-select').value;
            if(!db.attendanceData[mIdx] || !db.attendanceData[mIdx].fridays[fIdx]) return;
            
            const fri = db.attendanceData[mIdx].fridays[fIdx];
            document.getElementById('friday-visible-check').checked = fri.visible; 
            document.getElementById('friday-active-check').checked = fri.hasAttendance;
            if(!fri.records) fri.records = {};
            
            loadPlayerRecord();
        }

        function loadPlayerRecord() {
            const mIdx = document.getElementById('attend-month-select').value; 
            const fIdx = document.getElementById('attend-friday-select').value;
            const player = document.getElementById('attend-player-select').value;
            
            let records = db.attendanceData[mIdx].fridays[fIdx].records;
            if(!records[player]) records[player] = { friday: false, study: false, activity: false };
            
            document.getElementById('chk-friday').checked = records[player].friday;
            document.getElementById('chk-study').checked = records[player].study;
            document.getElementById('chk-activity').checked = records[player].activity;
        }

        function savePlayerRecord() {
            const mIdx = document.getElementById('attend-month-select').value; 
            const fIdx = document.getElementById('attend-friday-select').value;
            const player = document.getElementById('attend-player-select').value;
            
            db.attendanceData[mIdx].fridays[fIdx].records[player] = {
                friday: document.getElementById('chk-friday').checked,
                study: document.getElementById('chk-study').checked,
                activity: document.getElementById('chk-activity').checked
            };
        }

        function updateFridayMeta() {
            const f = db.attendanceData[document.getElementById('attend-month-select').value].fridays[document.getElementById('attend-friday-select').value];
            f.visible = document.getElementById('friday-visible-check').checked; 
            f.hasAttendance = document.getElementById('friday-active-check').checked;
        }

        /* ====== نظام المباريات ====== */
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.glass-card').forEach(c => { if(c.id !== 'login-section') c.classList.add('hidden'); });
            document.getElementById(`btn-tab-${tab}`).classList.add('active'); 
            document.getElementById(`section-${tab}`).classList.remove('hidden');
        }

        function addNewRound() {
            const name = document.getElementById('new-round-name').value.trim(); const date = document.getElementById('new-round-date').value.trim();
            if(!name) return;
            const newId = db.leagueData.length + 1;
            db.leagueData.push({ id: newId, name: name, date: date, matches: [] });
            populateSelects(); document.getElementById('round-matches-select').value = newId; loadRoundMatchesList();
        }

        function addNewMatch() {
            const round = db.leagueData.find(r => r.id == document.getElementById('round-matches-select').value);
            const tA = document.getElementById('match-team-a').value; const tB = document.getElementById('match-team-b').value;
            if(tA === tB) return alert("لا يمكن اختيار نفس الفريق!");
            round.matches.push({ teamA: tA, teamB: tB, scoreA: 0, scoreB: 0, eventsA: { goals: [], yellowCards: [], redCards: [] }, eventsB: { goals: [], yellowCards: [], redCards: [] } });
            loadRoundMatchesList();
        }

        function loadRoundMatchesList() {
            const round = db.leagueData.find(r => r.id == document.getElementById('round-matches-select').value);
            const matchSelect = document.getElementById('match-edit-select');
            if(!round || round.matches.length === 0) {
                matchSelect.innerHTML = `<option value="">-- لا يوجد مباريات --</option>`;
                document.getElementById('match-editor-area').classList.add('hidden');
                return;
            }
            
            matchSelect.innerHTML = round.matches.map((m, i) => `<option value="${i}">${m.teamA} ضد ${m.teamB}</option>`).join('');
            document.getElementById('match-editor-area').classList.remove('hidden');
            loadMatchDetails();
        }

        function loadMatchDetails() {
            const rId = document.getElementById('round-matches-select').value;
            const mIdx = document.getElementById('match-edit-select').value;
            if (mIdx === "") return;
            
            const match = db.leagueData.find(r => r.id == rId).matches[mIdx];
            
            document.getElementById('live-score-display').innerText = `${match.teamA} (${match.scoreA}) - (${match.scoreB}) ${match.teamB}`;
            document.getElementById('event-team').innerHTML = `<option value="A">${match.teamA}</option><option value="B">${match.teamB}</option>`;
            
            toggleEventFields();
            renderMatchEvents(match, mIdx);
        }

        function toggleEventFields() {
            const type = document.getElementById('event-type').value;
            const assistContainer = document.getElementById('assist-container');
            if(type === 'goals') { assistContainer.classList.remove('hidden'); } 
            else { assistContainer.classList.add('hidden'); }
        }

        function addMatchEvent() {
            const rId = document.getElementById('round-matches-select').value;
            const mIdx = document.getElementById('match-edit-select').value;
            const match = db.leagueData.find(r => r.id == rId).matches[mIdx];
            
            const type = document.getElementById('event-type').value;
            const team = document.getElementById('event-team').value;
            const player = document.getElementById('event-player').value;
            const assist = document.getElementById('event-assist').value;
            const isOwnGoal = document.getElementById('event-owngoal').checked;

            let eventText = player;

            if (type === 'goals') {
                if (isOwnGoal) {
                    eventText += " <span class='own-goal'>(هدف ذاتي)</span>";
                } else if (assist) {
                    eventText += ` (أسيست ${assist})`;
                }
                if (team === 'A') match.scoreA++; else match.scoreB++;
            }

            match[`events${team}`][type].push(eventText);
            
            document.getElementById('event-owngoal').checked = false;
            document.getElementById('event-assist').value = "";
            
            loadMatchDetails(); 
        }

        // دالة مسح الحدث (بتنقص الاسكور لو مسحت جول)
        function removeEvent(team, type, eventIndex) {
            const rId = document.getElementById('round-matches-select').value;
            const mIdx = document.getElementById('match-edit-select').value;
            const match = db.leagueData.find(r => r.id == rId).matches[mIdx];
            
            if (type === 'goals') {
                if (team === 'A' && match.scoreA > 0) match.scoreA--;
                if (team === 'B' && match.scoreB > 0) match.scoreB--;
            }
            
            match[`events${team}`][type].splice(eventIndex, 1);
            loadMatchDetails();
        }

        // دالة عرض الأحداث المحفوظة عشان نمسح منها
        function renderMatchEvents(match, mIdx) {
            const list = document.getElementById('match-events-list');
            let html = '<div style="font-size:13px; color:var(--primary); font-weight:bold; margin-top:20px; margin-bottom:10px;">📋 الأحداث المسجلة في المباراة:</div>';
            
            const eventTypes = { 'goals': '⚽ هدف', 'yellowCards': '🟨 إنذار', 'redCards': '🟥 طرد' };
            let hasEvents = false;

            ['A', 'B'].forEach(team => {
                let teamName = team === 'A' ? match.teamA : match.teamB;
                ['goals', 'yellowCards', 'redCards'].forEach(type => {
                    match[`events${team}`][type].forEach((ev, idx) => {
                        hasEvents = true;
                        html += `<div class="event-badge">
                                    <span><strong>${eventTypes[type]} لـ ${teamName}:</strong> ${ev}</span>
                                    <button class="btn-danger" onclick="removeEvent('${team}', '${type}', ${idx})">حذف</button>
                                 </div>`;
                    });
                });
            });

            if (!hasEvents) {
                html += '<div style="font-size:12px; color:#aaa; text-align:center;">لا يوجد أحداث مسجلة حتى الآن.</div>';
            }
            list.innerHTML = html;
        }

        // دالة مسح المباراة بالكامل
        function deleteMatch() {
            const rId = document.getElementById('round-matches-select').value;
            const mIdx = document.getElementById('match-edit-select').value;
            if (mIdx === "") return;

            if (confirm("⚠️ هل أنت متأكد أنك تريد حذف هذه المباراة بالكامل؟\n\nسيتم مسحها وكل الأهداف والإنذارات بداخلها!")) {
                const round = db.leagueData.find(r => r.id == rId);
                round.matches.splice(mIdx, 1);
                alert("🗑️ تم حذف المباراة بنجاح!");
                loadRoundMatchesList();
            }
        }

        // السحر: حساب الإحصائيات أوتوماتيكياً قبل الرفع
        function autoCalculateStats() {
            let scorers = {}; let assists = {};
            db.leagueData.forEach(round => {
                round.matches.forEach(match => {
                    const processGoals = (goalsList, teamName) => {
                        goalsList.forEach(goalStr => {
                            if(goalStr.includes('own-goal') || goalStr.includes('هدف ذاتي')) return; 
                            
                            let scorerMatch = goalStr.split('(')[0].split('<')[0].trim();
                            if(scorerMatch) {
                                if(!scorers[scorerMatch]) scorers[scorerMatch] = {name: scorerMatch, team: teamName, count: 0};
                                scorers[scorerMatch].count++;
                            }
                            let assistMatch = goalStr.match(/\(أسيست\s+([^)]+)\)/);
                            if(assistMatch && assistMatch[1]) {
                                let assistName = assistMatch[1].trim();
                                if(!assists[assistName]) assists[assistName] = {name: assistName, team: teamName, count: 0};
                                assists[assistName].count++;
                            }
                        });
                    };
                    processGoals(match.eventsA.goals, match.teamA);
                    processGoals(match.eventsB.goals, match.teamB);
                });
            });
            db.statsData.topScorers = Object.values(scorers).sort((a,b) => b.count - a.count);
            db.statsData.topAssists = Object.values(assists).sort((a,b) => b.count - a.count);
        }

        async function pushChangesToGitHub() {
            const token = localStorage.getItem('gh_token'); const owner = localStorage.getItem('gh_owner'); const repo = localStorage.getItem('gh_repo');
            if(!token || !owner || !repo) return alert("⚠️ املأ إعدادات GitHub أولاً في تبويب (الربط)!");

            autoCalculateStats();

            const url = `https://api.github.com/repos/${owner}/${repo}/contents/database.json`;
            try {
                const getRes = await fetch(url, { headers: { "Authorization": `token ${token}` } });
                if (!getRes.ok) throw new Error("تأكد من صحة بيانات الربط والـ Token.");
                const currentSha = (await getRes.json()).sha;
                
                const jsonString = JSON.stringify(db, null, 2);
                const utf8Bytes = new TextEncoder().encode(jsonString);
                const base64Content = btoa(String.fromCharCode.apply(null, utf8Bytes));

                const putRes = await fetch(url, {
                    method: "PUT",
                    headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ message: "تحديث أوتوماتيكي للنتائج والحضور ⚡", content: base64Content, sha: currentSha })
                });

                if(putRes.ok) alert("🎉 تم الحفظ بنجاح! الموقع اتحدث بالكامل والاسكور والإحصائيات اتظبطت.");
                else alert("❌ فشل الحفظ. راجع صلاحيات الـ Token.");
            } catch (error) { alert("❌ خطأ: " + error.message); }
        }
    </script>
</body>
</html>
